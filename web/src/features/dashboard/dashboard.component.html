<div class="dashboard">
  <mat-sidenav-container class="dashboard__shell">
    <mat-sidenav
      class="dashboard__sidenav"
      mode="side"
      opened
      fixedInViewport
      [disableClose]="true"
    >
      <div class="dashboard__brand">
        <img class="dashboard__logo" src="/assets/logo.png" alt="Mastery" />
      </div>

      <nav class="dashboard__nav" aria-label="Main">
        <mat-nav-list>
          @for (item of navItems; track item.route) {
            <a
              mat-list-item
              class="dashboard__nav-item"
              [routerLink]="item.route"
              routerLinkActive="dashboard__nav-item--active"
              [routerLinkActiveOptions]="{ exact: item.exact }"
            >
              <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
              <span matListItemTitle>{{ item.label }}</span>
            </a>
          }
        </mat-nav-list>
      </nav>

      <div class="dashboard__footer">
        <button
          class="dashboard__logout"
          mat-stroked-button
          type="button"
          (click)="logout()"
        >
          <mat-icon>logout</mat-icon>
          Logout
        </button>
      </div>
    </mat-sidenav>

    <mat-sidenav-content class="dashboard__content">
      <mat-toolbar class="dashboard__toolbar" color="primary">
        <span class="dashboard__toolbar-title">Smart document processing</span>
      </mat-toolbar>
      <main class="dashboard__main">
        <router-outlet />
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
