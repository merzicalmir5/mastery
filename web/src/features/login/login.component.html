<section class="login">
  <mat-card class="login__card" appearance="outlined">
    <form class="login__form" [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <div class="login__brand">
        <img class="login__logo" src="/assets/logo.png" alt="Mastery logo" />
      </div>

      <mat-form-field class="login__field" appearance="outline">
        <input
          matInput
          type="email"
          formControlName="email"
          placeholder="Email"
          aria-label="Email"
        />
        @if (loginForm.controls.email.touched && loginForm.controls.email.invalid) {
          <mat-error>Please enter a valid email address.</mat-error>
        }
      </mat-form-field>

      <mat-form-field class="login__field" appearance="outline">
        <input
          matInput
          type="password"
          formControlName="password"
          placeholder="Password"
          aria-label="Password"
        />
        @if (loginForm.controls.password.touched && loginForm.controls.password.invalid) {
          <mat-error>Password must be at least 6 characters.</mat-error>
        }
      </mat-form-field>

      <button class="login__submit" mat-flat-button type="submit">Sign In</button>
    </form>
  </mat-card>
</section>
