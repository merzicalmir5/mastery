<section class="login">
  <mat-card class="login__card" appearance="outlined">
    <form class="login__form" [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <div class="login__brand">
        <img class="login__logo" src="/assets/logo.png" alt="Mastery logo" />
      </div>

      <mat-form-field class="login__field" appearance="outline">
        <input
          matInput
          type="text"
          autocomplete="username"
          formControlName="username"
          placeholder="Username"
          aria-label="Username"
        />
        @if (loginForm.controls.username.touched && loginForm.controls.username.invalid) {
          <mat-error>Username is required.</mat-error>
        }
      </mat-form-field>

      <mat-form-field class="login__field" appearance="outline">
        <input
          matInput
          type="password"
          autocomplete="current-password"
          formControlName="password"
          placeholder="Password"
          aria-label="Password"
        />
        @if (loginForm.controls.password.touched && loginForm.controls.password.invalid) {
          <mat-error>Password is required.</mat-error>
        }
      </mat-form-field>

      <button class="login__submit" mat-flat-button type="submit">Sign In</button>
    </form>
  </mat-card>
</section>
