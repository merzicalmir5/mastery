<section class="forgot-password">
  <mat-card class="forgot-password__card" appearance="outlined">
    <form
      class="forgot-password__form"
      [formGroup]="forgotPasswordForm"
      (ngSubmit)="submit()"
      novalidate
    >
      <div class="forgot-password__brand">
        <img
          class="forgot-password__logo"
          [src]="theme.isDark() ? '/assets/logo-smart-white-on-dark.png' : '/assets/logo-smart-black-on-light.png'"
          alt="SMART — Document processing system"
        />
      </div>
      <h1 class="forgot-password__title">Forgot Password</h1>

      <mat-form-field class="forgot-password__field" appearance="outline">
        <input
          matInput
          type="email"
          autocomplete="email"
          formControlName="email"
          placeholder="Email"
          aria-label="Email"
        />
        @if (forgotPasswordForm.controls.email.touched && forgotPasswordForm.controls.email.invalid) {
          <mat-error>Valid email is required.</mat-error>
        }
      </mat-form-field>

      <button class="forgot-password__submit" mat-flat-button type="submit">
        Send Password Reset
      </button>
      <a class="forgot-password__back-login" routerLink="/login">Back to login</a>
    </form>
  </mat-card>
</section>
