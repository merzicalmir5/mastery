services:
  postgres:
    image: postgres:16-alpine
    container_name: mastery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mastery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mastery"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Image → text/JSON (FastAPI; default Tesseract). Optional: build args INSTALL_EASYOCR=true + env OCR_ENGINE=easyocr.
  ocr-api:
    build:
      context: ./ocr-api
      dockerfile: Dockerfile
    container_name: mastery-ocr-api
    restart: unless-stopped
    environment:
      PORT: 8000
    ports:
      - "8000:8000"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mastery-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mastery?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-with-strong-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-with-strong-refresh-secret}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      APP_BASE_URL: http://localhost:3000
      FRONTEND_BASE_URL: http://localhost:4200
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-no-reply@mastery.local}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_OCR_MODEL: ${MISTRAL_OCR_MODEL:-mistral-ocr-latest}
      MISTRAL_OCR_TIMEOUT_MS: ${MISTRAL_OCR_TIMEOUT_MS:-120000}
    ports:
      - "3000:3000"
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-http://localhost:3000}
    container_name: mastery-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres_data:
  api_uploads:
